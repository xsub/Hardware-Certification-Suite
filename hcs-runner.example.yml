run:
  # Copy this file to hcs-runner.yml. The runner auto-loads that local file.
  # Generated sandboxes are created as:
  # /var/tmp/AlmaLinux-HCS-<UTC timestamp>-RunID-<run id>
  base_dir: /var/tmp
  # Optional named preset to use when `hcs run` is called without --preset.
  default_preset: default
  # Optional stable run id. Leave empty to generate one.
  id:
  # Optional explicit sandbox root for this run.
  sandbox_dir:

paths:
  # All paths below are relative to the sandbox root and must stay inside it.
  runner_dir: runner
  logs_dir: logs
  scratch_dir: scratch
  cache_dir: cache
  artifacts_dir: artifacts
  sut_tests_dir: sut-tests
  phoronix_dir: phoronix
  ltp_dir: ltp

ansible:
  extra_vars: {}

presets:
  default:
    profile: check
    inventory: 127.0.0.1,
    # connection is inferred from the inventory when omitted: local for a
    # loopback host, SSH for a remote SUT. Pin it only to override that.
    repeat: 1
    tests:
      hw_detection:
        enabled: true
        required: false
        profile: check
      gpu_burn:
        enabled: false
        required: false
        profile: check
        duration: 60
        snap:
          package: gpu-burn
          install: false
          remove_after: true
  certification:
    description: ALOSF certification policy preset for ordinary automated hardware certification evidence.
    profile: long
    inventory: 127.0.0.1,
    repeat: 1
    tests:
      hw_detection:
        enabled: true
        required: true
        profile: check
      containers:
        enabled: true
        required: true
        profile: medium
      kvm:
        enabled: true
        required: true
        profile: medium
      cpu:
        enabled: true
        required: true
        profile: long
        duration: 30m
      network:
        enabled: true
        required: true
        profile: long
        duration: 3600
      ltp:
        enabled: true
        required: true
        profile: long
      phoronix:
        enabled: true
        required: true
        profile: long
      raid:
        enabled: false
        required: false
        profile: medium
        duration: 600
        reason: Run when the SUT has MD RAID or storage topology relevant to certification.
      gpu_burn:
        enabled: false
        required: false
        profile: medium
        duration: 900
        reason: Run when the SUT includes supported NVIDIA GPUs and nvidia-smi works.
        snap:
          package: gpu-burn
          install: false
          remove_after: true
      cllimits:
        enabled: false
        required: false
        profile: medium
        reason: CloudLinux-specific validation, not part of ordinary AlmaLinux hardware certification.
    manual_tests:
      usb:
        required: true
        reason: Interactive physical-port validation is handled through interactive.yml.
      pxe:
        required: true
        reason: Interactive boot/network validation is handled through interactive.yml.
