---

- name: Network - requires a separate SUT
  ansible.builtin.debug:
    msg: "HCS_UNSUPPORTED: network test needs a distinct SUT (local/single-host run)"
  when: not network_is_remote | bool

- name: Network - report missing endpoint addresses to runner
  ansible.builtin.debug:
    msg: "HCS_RESULT: fail cannot determine LTS/SUT addresses (no SSH_CONNECTION in the Ansible session)"
  when: network_is_remote | bool and (lts_ip | length == 0 or sut_ip | length == 0)

- name: Network - run against the SUT
  when: network_is_remote | bool and lts_ip | length > 0 and sut_ip | length > 0
  block:
    - name: Network - enable EPEL
      ansible.builtin.package:
        name: epel-release
        state: present

    - name: Network - record packages already installed
      ansible.builtin.package_facts:

    - name: Network - note which packages HCS will install
      # Remove only these afterwards; removing the full list would uninstall
      # packages the operator already had.
      ansible.builtin.set_fact:
        network_new_pkgs: "{{ ['iperf3', 'ethtool', 'net-tools', 'lshw', 'bc'] | difference(ansible_facts.packages.keys() | list) }}"

    - name: Network - install tools
      # yum/dnf (not ansible.builtin.package) so enablerepo is honored; the
      # test script also needs lshw (device discovery) and bc (rate math).
      ansible.builtin.yum:
        name: [iperf3, ethtool, net-tools, lshw, bc]
        state: present
        enablerepo: epel

    # Required to run tests in parallel on opennebula
    - name: Network - ensure iperf3 is not already running
      ansible.builtin.shell: ps -aux | grep iperf3 | wc -l
      register: result
      until: result.stdout | int <= 2
      delegate_to: 127.0.0.1
      retries: 1000
      delay: 5
      when: run_on_nebula is defined

    - name: Network - settle before run
      ansible.builtin.pause:
        seconds: 2
      when: run_on_nebula is defined

    - name: Network - run test
      ansible.builtin.command:
        sh {{ lts_tests_dir }}/network/run_test.sh {{ lts_ip }} {{ sut_ip }}
        {{ test_network['duration'] }} {{ test_network['speed'] }} disable-preloader {{ test_network['device'] }}
      delegate_to: localhost
      register: output

    - name: Network - copy log
      ansible.builtin.copy:
        content: "{{ output.stdout }}"
        dest: "{{ lts_logs_dir }}/network.log"
      delegate_to: localhost

    - name: Network - report failure to runner
      ansible.builtin.debug:
        msg: "HCS_RESULT: fail network run_test.sh exited rc={{ output.rc }}"
      when: output.rc | default(0) != 0

    - name: Network - remove only packages HCS installed
      ansible.builtin.package:
        name: "{{ network_new_pkgs }}"
        state: absent
      when: run_on_nebula is not defined and network_new_pkgs | length > 0
