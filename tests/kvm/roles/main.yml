---

- name: Test KVM - check compatibility
  shell: "{{ sut_tests_dir }}/kvm/pre-checks.sh"
  register: kvm_compatibility

- name: Test KVM - copy log
  become: false
  local_action: copy content="{{ kvm_compatibility.stdout }}" dest="{{ lts_logs_dir }}/kvm.log"

- name: Test KVM - unsupported without CPU virtualization
  ansible.builtin.debug:
    msg: "HCS_UNSUPPORTED: KVM requires CPU virtualization (pre-checks rc={{ kvm_compatibility.rc }})"
  when: kvm_compatibility.rc != 0

- when: kvm_compatibility.rc == 0
  block:
    - name: Test KVM - install packages
      yum:
        name:
          - qemu-kvm
          - libvirt
        state: present
      register: kvm_pkgs
    - name: Test KVM - restart libvirtd service
      systemd:
        name: libvirtd.service
        state: restarted
    - name: Test KVM - check qemu installation
      shell: "{{ sut_tests_dir }}/kvm/qemu-installation-checks.sh"
      register: qemu_is_ok
    - name: Test KVM - write log
      become: false
      local_action: copy content="{{ kvm_compatibility.stdout }}\n{{ qemu_is_ok.stdout }}" dest="{{ lts_logs_dir }}/kvm.log"
    - name: Test KVM - create qemu-kvm symlink # for `virsh create`
      file:
        src: /usr/libexec/qemu-kvm
        dest: /usr/bin/qemu-kvm
        state: link
        owner: root
        group: root
      register: kvm_symlink

    # Test
    - name: Test KVM - run test
      when: qemu_is_ok.rc == 0 and kvm_compatibility.rc == 0
      shell: "{{ sut_tests_dir }}/kvm/run_test.sh {{ sut_tests_dir }}/kvm/test-vm.xml"
      register: report

    - name: Test KVM - copy log
      become: false
      local_action: copy content="{{ kvm_compatibility.stdout }}\n{{ qemu_is_ok.stdout }}\n{{ report.stdout | default('') }}" dest="{{ lts_logs_dir }}/kvm.log"
      when: report is defined

    - name: Test KVM - unsupported when KVM modules or device are missing
      ansible.builtin.debug:
        msg: "HCS_UNSUPPORTED: KVM modules/device unavailable (qemu-checks rc={{ qemu_is_ok.rc }})"
      when: qemu_is_ok.rc != 0

    - name: Test KVM - report failure to runner
      ansible.builtin.debug:
        msg: "HCS_RESULT: fail kvm run_test.sh exited rc={{ report.rc }}"
      when: report is defined and report.rc | default(0) != 0

    # Cleanup
    - name: Test KVM - remove packages HCS installed
      yum:
        name:
          - qemu-kvm
          - libvirt
        state: absent
      when: kvm_pkgs.changed

    - name: Test KVM - remove qemu-kvm symlink HCS created
      file:
        path: /usr/bin/qemu-kvm
        state: absent
      when: kvm_symlink.changed
