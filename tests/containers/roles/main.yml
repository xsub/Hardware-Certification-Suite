---

- name: Containers - record packages already installed
  ansible.builtin.package_facts:

- name: Containers - note which packages HCS will install
  # Remove only these afterwards; removing the full list would uninstall
  # podman on systems that already had it (e.g. when only wget was missing).
  ansible.builtin.set_fact:
    containers_new_pkgs: "{{ ['podman', 'wget'] | difference(ansible_facts.packages.keys() | list) }}"

- name: Containers - ensure runtime and client
  ansible.builtin.package:
    name: [podman, wget]
    state: present

- name: Containers - run test
  ansible.builtin.shell: "{{ sut_tests_dir }}/containers/run_test.sh 2>&1"
  register: output

- name: Containers - copy log
  ansible.builtin.copy:
    content: "{{ output.stdout }}"
    dest: "{{ lts_logs_dir }}/containers.log"
  delegate_to: localhost

- name: Containers - report failure to runner
  ansible.builtin.debug:
    msg: "HCS_RESULT: fail containers run_test.sh exited rc={{ output.rc }}"
  when: output.rc | default(0) != 0

- name: Containers - remove only packages HCS installed
  ansible.builtin.package:
    name: "{{ containers_new_pkgs }}"
    state: absent
  when: containers_new_pkgs | length > 0
