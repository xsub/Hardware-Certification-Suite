---

# Setup
- name: Test RAID - record packages already installed
  ansible.builtin.package_facts:

- name: Test RAID - note which packages HCS will install
  # Remove only these afterwards; removing the full list would uninstall
  # packages the operator already had.
  ansible.builtin.set_fact:
    raid_new_pkgs: "{{ ['mdadm', 'fio'] | difference(ansible_facts.packages.keys() | list) }}"

- name: Test RAID - install dependent software
  ansible.builtin.package:
    name:
      - mdadm
      - fio
    state: present

# Necessary settings before running tests on opennebula
- name: remember current vd
  ansible.builtin.shell: df -h|grep 'dev/vd'|awk '{print $1}'
  register: current
  when: run_on_nebula is defined

- name: returns vds for raid
  ansible.builtin.shell:
    "count=0; m=('/dev/vda1' '/dev/vdb1' '/dev/vdc1'); for i in ${m[@]};
    do test {{ current.stdout }} == ${m[$count]} && unset m[$count]; ((count=count+1)); done;
    echo ${m[@]}"
  register: result
  when: run_on_nebula is defined

- name: vd1
  ansible.builtin.shell: "echo {{ result.stdout }}|awk '{print $1}'"
  register: vd1
  when: run_on_nebula is defined

- name: vd2
  ansible.builtin.shell: "echo {{ result.stdout }}|awk '{print $2}'"
  register: vd2
  when: run_on_nebula is defined

- name: pip3 install <pexpect>
  pip: name=pexpect state=present executable=/usr/bin/pip3
  when: run_on_nebula is defined

- name: configure raid
  ansible.builtin.expect:
    command: "mdadm --create /dev/md0 --level=1 --raid-devices=2 {{ vd1.stdout }} {{ vd2.stdout }}"
    responses:
      "Continue creating array?": "y\r"
  when: run_on_nebula is defined

# Test
- name: Test RAID - run test
  ansible.builtin.shell: "{{ sut_tests_dir }}/raid/run_test.sh {{ test_raid['duration'] }} disable-preloader"
  environment:
    # fio writes raw data over the array; the script skips arrays that are
    # mounted or hold data unless the operator opts into data loss.
    HCS_RAID_ALLOW_DATA_LOSS: "{{ test_raid['allow_data_loss'] }}"
  register: output

- name: Test RAID - copy log
  local_action: copy content="{{ output.stdout }}" dest="{{ lts_logs_dir }}/raid.log"

- name: Test RAID - collect unsupported marker
  ansible.builtin.set_fact:
    hcs_raid_unsupported: "{{ output.stdout_lines | select('match', '^HCS_UNSUPPORTED:') | list | first | default('') }}"

- name: Test RAID - report unsupported status to runner
  ansible.builtin.debug:
    msg: "{{ hcs_raid_unsupported }}"
  when: hcs_raid_unsupported | length > 0

- name: Test RAID - report failure to runner
  ansible.builtin.debug:
    msg: "HCS_RESULT: fail raid run_test.sh exited rc={{ output.rc }}"
  when: hcs_raid_unsupported | length == 0 and output.rc | default(0) != 0

# Cleanup
- name: Test RAID - remove only packages HCS installed
  ansible.builtin.package:
    name: "{{ raid_new_pkgs }}"
    state: absent
  when: raid_new_pkgs | length > 0
