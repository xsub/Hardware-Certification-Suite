---

- name: TEST LTP - make sure there is no old LTP test files
  file:
    path: '{{ item }}'
    state: absent
  with_items:
    - '{{ ltp_clone_path }}'
    - /opt/ltp

- name: TEST LTP - enable CRB/PowerTools
  community.general.dnf_config_manager:
    name: "{{ 'powertools' if ansible_facts['distribution_major_version'] | int == 8 else 'crb' }}"
    state: enabled

- name: TEST LTP - define build packages
  # Real rpm names (pkgconf-pkg-config, not the pkg-config provide) so the
  # installed-before diff below matches what rpm actually reports.
  ansible.builtin.set_fact:
    ltp_build_pkg_list:
      - automake
      - make
      - gcc
      - git
      - asciidoc
      - autoconf
      - clang
      - findutils
      - iproute
      - numactl-devel
      - libtirpc
      - libtirpc-devel
      - perl-JSON
      - perl-libwww-perl
      - pkgconf-pkg-config
      - pkgconf
      - libmnl-devel
      - bison
      - flex
      - m4
      - kernel-headers
      - glibc-headers

- name: TEST LTP - record packages already installed
  ansible.builtin.package_facts:

- name: TEST LTP - note which packages HCS will install
  # Remove only these afterwards. The old cleanup removed the whole list when
  # any one package was new — on a stock SUT that uninstalled core packages
  # like findutils and iproute (plus whatever depended on them).
  ansible.builtin.set_fact:
    ltp_new_pkgs: "{{ ltp_build_pkg_list | difference(ansible_facts.packages.keys() | list) }}"

- name: TEST LTP - install packages
  ansible.builtin.package:
    name: "{{ ltp_build_pkg_list }}"
    state: present
    update_cache: true

- name: TEST LTP - clone repo
  git:
    repo: https://github.com/linux-test-project/ltp.git
    dest: '{{ ltp_clone_path }}'
    clone: true
    version: "{{ ltp_version | default('20250930') }}"

- name: TEST LTP - compile
  shell: "cd {{ ltp_clone_path | quote }} ; make autotools ; ./configure >> {{ (hcs_scratch_dir + '/configure-ltp.log') | quote }}; make -j$(nproc) ; make install"
  # A tolerated compile result must not count as a failed/ignored task; the run
  # step below is the authoritative gate (HCS_RESULT).
  failed_when: false

- name: TEST LTP - run
  shell: "{{ sut_tests_dir }}/ltp/run_test.sh {{ test_ltp['suites'] | quote }} {{ test_ltp['log_file'] | quote }}"
  register: output
  ignore_errors: true

- name: Test LTP - copy log
  local_action: copy content="{{ output.stdout }}" dest="{{ lts_logs_dir }}/ltp.log"

- name: TEST LTP - report failure to runner
  ansible.builtin.debug:
    msg: "HCS_RESULT: fail ltp run_test.sh exited rc={{ output.rc }}"
  when: output.rc | default(0) != 0

- name: TEST LTP - remove only packages HCS installed
  ansible.builtin.package:
    name: "{{ ltp_new_pkgs }}"
    state: absent
  when: ltp_new_pkgs | length > 0

- name: TEST LTP - remove the LTP install tree
  # make install puts LTP under /opt/ltp outside the sandbox; leave the SUT
  # as found. The clone/build tree lives in the sandbox and is kept.
  ansible.builtin.file:
    path: /opt/ltp
    state: absent
