---

- name: TEST LTP - make sure there is no old LTP test files
  file:
    path: '{{ item }}'
    state: absent
  with_items:
    - '{{ ltp_clone_path }}'
    - /opt/ltp

- name: TEST LTP - enable CRB/PowerTools
  community.general.dnf_config_manager:
    name: "{{ 'powertools' if ansible_facts['distribution_major_version'] | int == 8 else 'crb' }}"
    state: enabled

- name: TEST LTP - install packages
  yum:
    name:
      - automake
      - make
      - gcc
      - git
      - asciidoc
      - autoconf
      - clang
      - findutils
      - iproute
      - numactl-devel
      - libtirpc
      - libtirpc-devel
      - perl-JSON
      - perl-libwww-perl
      - pkg-config
      - pkgconf
      - libmnl-devel
      - bison
      - flex
      - m4
      - kernel-headers
      - glibc-headers
    state: present
    update_cache: true

- name: TEST LTP - clone repo
  git:
    repo: https://github.com/linux-test-project/ltp.git
    dest: '{{ ltp_clone_path }}'
    clone: true
    version: '20220121'

- name: TEST LTP - compile
  shell: "cd {{ ltp_clone_path | quote }} ; make autotools ; ./configure >> {{ (hcs_scratch_dir + '/configure-ltp.log') | quote }}; make -j$(nproc) ; make install"
  ignore_errors: true

- name: TEST LTP - run
  shell: "{{ sut_tests_dir }}/ltp/run_test.sh {{ test_ltp['suites'] | quote }} {{ test_ltp['log_file'] | quote }}"
  register: output
  ignore_errors: true

- name: Test LTP - copy log
  local_action: copy content="{{ output.stdout }}" dest="{{ lts_logs_dir }}/ltp.log"

- name: TEST LTP - cleanup packages
  yum:
    name:
      - automake
      - make
      - gcc
      - git
      - asciidoc
      - autoconf
      - clang
      - findutils
      - iproute
      - numactl-devel
      - libtirpc
      - libtirpc-devel
      - perl-JSON
      - perl-libwww-perl
      - pkg-config
      - pkgconf
      - libmnl-devel
      - bison
      - flex
      - m4
      - kernel-headers
      - glibc-headers
    skip_broken: true
    state: absent
