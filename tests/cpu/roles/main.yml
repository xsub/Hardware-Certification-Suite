---

- name: Test cpu - record packages already installed
  ansible.builtin.package_facts:

- name: Test cpu - note which packages HCS will install
  # Remove only these afterwards; an operator-preinstalled stress-ng or EPEL
  # repo stays in place.
  ansible.builtin.set_fact:
    cpu_new_pkgs: "{{ ['epel-release', 'stress-ng'] | difference(ansible_facts.packages.keys() | list) }}"

- name: Test cpu - enable epel
  ansible.builtin.package:
    name: epel-release
    state: latest

- name: Test cpu - install stress-ng
  yum:
    name: stress-ng
    state: present
    enablerepo: epel

- name: Test CPU - create scratch dir
  ansible.builtin.file:
    path: "{{ test_cpu['scratch_dir'] }}"
    state: directory
    mode: "0755"

- name: Test CPU - run test
  shell: >
    {{ sut_tests_dir }}/cpu/run_test.sh
    {{ test_cpu['duration'] | quote }}
    {{ test_cpu['log_file'] | quote }}
    {{ test_cpu['scratch_dir'] | quote }}
  register: output

- name: Test CPU - copy log
  local_action: copy content="{{ output.stdout }}" dest="{{ lts_logs_dir }}/cpu.log"

- name: Test CPU - report failure to runner
  ansible.builtin.debug:
    msg: "HCS_RESULT: fail cpu run_test.sh exited rc={{ output.rc }}"
  when: output.rc | default(0) != 0

- name: Test CPU - remove only packages HCS installed
  ansible.builtin.package:
    name: "{{ cpu_new_pkgs }}"
    state: absent
  when: cpu_new_pkgs | length > 0
