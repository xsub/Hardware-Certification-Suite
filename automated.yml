---

- name: Hardware certification
  hosts: all
  vars_files:
    - vars.yml
  ignore_errors: true
  environment:
    LANG: "en_US.UTF-8"
    LC_ALL: "en_US.UTF-8"
  tasks:

    # GENERAL SETUP
    - name: Create LTS logs dir
      tags: [logs_folder, containers, cpu, hw_detection, kvm, network, raid, ltp, phoronix, gpu_burn, ai_llm, cllimits]
      block:
        - name: Create LTS logs dir
          ansible.builtin.file:
            path: "{{ lts_logs_dir }}"
            state: "directory"
            # certification evidence is not world-readable
            mode: "0750"
          delegate_to: localhost

    - name: Create SUT work dirs
      tags: [logs_folder, tests_copy, containers, cpu, hw_detection, kvm, network, raid, ltp, phoronix, gpu_burn, ai_llm, cllimits]
      block:
        - name: Create SUT work dirs
          ansible.builtin.file:
            path: "{{ item }}"
            state: "directory"
            # certification evidence is not world-readable
            mode: "0750"
          loop:
            - "{{ hcs_work_dir }}"
            - "{{ hcs_scratch_dir }}"
            - "{{ hcs_cache_dir }}"
            - "{{ hcs_artifacts_dir }}"

    - name: Copy tests
      tags: [tests_copy, containers, cpu, hw_detection, kvm, network, raid, ltp, phoronix, gpu_burn, ai_llm, cllimits]
      block:
        - name: Copy tests
          ansible.builtin.copy:
            src: "{{ lts_tests_dir }}/"
            dest: "{{ sut_tests_dir }}"
            mode: "0755"
            directory_mode: "0755"

    ##########

    # EXAMPLE
    # - tags: example
    #   block:
    #   - include: "{{ lts_tests_dir }}/example/roles/main.yml"

    # CONTAINERS
    - name: Containers
      tags: containers
      block:
        - name: Containers
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/containers/roles/main.yml"

    # CPU
    - name: CPU
      tags: cpu
      block:
        - name: CPU
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/cpu/roles/main.yml"

    # HW DETECTION
    - name: Hardware Detection
      tags: hw_detection
      block:
        - name: Hardware Detection
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/hw_detection/roles/main.yml"

    # KVM
    - name: KVM
      tags: kvm
      become: true
      block:
        - name: KVM
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/kvm/roles/main.yml"

    # NETWORK
    - name: Network
      tags: network
      block:
        - name: Network
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/network/roles/main.yml"

    # RAID
    - name: MD RAID
      tags: raid
      block:
        - name: MD RAID
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/raid/roles/main.yml"

    # LTP
    - name: LTP
      tags: ['never', 'ltp']
      block:
        - name: LTP
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/ltp/roles/main.yml"

    # PHORONIX
    - name: Phoronix
      tags: ['never', 'phoronix']
      block:
        - name: Phoronix
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/phoronix/roles/main.yml"

    # GPU BURN
    - name: GPU Burn
      tags: ['never', 'gpu_burn']
      block:
        - name: GPU Burn
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/gpu_burn/roles/main.yml"

    # AI INFERENCE (llama.cpp)
    - name: AI inference
      tags: ['never', 'ai_llm']
      block:
        - name: AI inference
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/ai_llm/roles/main.yml"

    # lve limits/cagefs
    - name: CL limits unsupported on AlmaLinux
      tags: cllimits
      ansible.builtin.debug:
        msg: "HCS_UNSUPPORTED: cllimits validates CloudLinux LVE/CageFS and does not apply to {{ ansible_distribution }}"
      # Without this marker a skipped include left a clean recap and the
      # runner recorded a test that never ran as passed.
      when: ansible_distribution == 'AlmaLinux'

    - name: CL limits
      tags: cllimits
      when: ansible_distribution != 'AlmaLinux'
      block:
        - name: CL limits
          ansible.builtin.include_tasks: "{{ lts_tests_dir }}/cllimits/roles/main.yml"

    ##########

    # GENERAL CLEANUP
    - name: Cleanup
      tags: [tests_cleanup, containers, cpu, hw_detection, kvm, network, raid, ltp, phoronix, gpu_burn, ai_llm, cllimits]
      block:
        - name: Remove tests
          ansible.builtin.file:
            path: "{{ sut_tests_dir }}"
            state: absent
