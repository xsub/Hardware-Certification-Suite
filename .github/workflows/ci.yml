name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "PyYAML>=6.0.1,<7"

      - name: Validate YAML files
        run: python .github/scripts/validate-yaml.py

      - name: Validate shell script syntax
        run: bash .github/scripts/check-shell-syntax.sh

      - name: Install Ansible syntax-check dependencies
        run: |
          python -m pip install "ansible-core>=2.17,<2.18"
          ansible-galaxy collection install community.general ansible.posix

      - name: Check Ansible playbook syntax
        run: |
          ansible-playbook --syntax-check -i 127.0.0.1, automated.yml
          ansible-playbook --syntax-check -i 127.0.0.1, interactive.yml
