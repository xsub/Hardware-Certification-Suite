name: AlmaLinux

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  almalinux-smoke:
    name: AlmaLinux ${{ matrix.version }} smoke
    runs-on: ubuntu-latest
    container:
      image: almalinux:${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "8"
          - "9"
          - "10"

    steps:
      - name: Install base tools
        run: |
          dnf -y install bash findutils git python3 python3-pip
          python3 -m pip install --user "PyYAML<6.1" || dnf -y install python3-pyyaml

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repository YAML on AlmaLinux
        run: python3 .github/scripts/validate-yaml.py

      - name: Validate shell script syntax on AlmaLinux
        run: bash .github/scripts/check-shell-syntax.sh

  almalinux-functional:
    name: AlmaLinux ${{ matrix.version }} functional run
    runs-on: ubuntu-latest
    container:
      image: almalinux:${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "9"
          - "10"

    steps:
      - name: Install runtime
        run: |
          dnf -y install git python3 python3-pip ansible-core util-linux pciutils
          python3 -m pip install --upgrade pip

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install runner dependencies
        run: python3 -m pip install -r requirements-runner.txt

      - name: Check profile runs end to end (hw_detection is unsupported in containers)
        run: |
          python3 -m hcs run --profile check --inventory 127.0.0.1, -c local --sandbox-dir "$PWD/ci-check"
          python3 - <<'PY'
          import json
          summary = json.load(open("ci-check/runner/run.summary.json"))
          # CI runs in a container, which has no SMBIOS/DMI tables: hw_detection
          # must report unsupported (not a hollow pass), so the run completes as
          # passed_with_warnings. Real VMs/bare metal still assert hard evidence.
          assert summary["status"] == "passed_with_warnings", summary["status"]
          hw = next(r for r in summary["results"] if r["test_id"] == "hw_detection")
          assert hw["status"] == "unsupported", hw
          assert "container" in hw["status_reason"], hw["status_reason"]
          print("check status:", summary["status"], "-", hw["status_reason"])
          PY

      - name: Network degrades to unsupported on a single host
        run: |
          python3 -m hcs run --test network --inventory 127.0.0.1, -c local --sandbox-dir "$PWD/ci-net"
          python3 - <<'PY'
          import json
          summary = json.load(open("ci-net/runner/run.summary.json"))
          network = next(r for r in summary["results"] if r["test_id"] == "network")
          assert network["status"] == "unsupported", network
          print("network status:", network["status"], "-", network["status_reason"])
          PY
