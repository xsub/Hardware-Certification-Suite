name: Python 3.9+

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runner-smoke:
    name: Python ${{ matrix.python-version }} runner smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.14"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runner package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile runner package
        run: python -m compileall hcs

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Verify the hcs console script
        run: |
          hcs --version
          hcs profiles
          hcs tests

      - name: Configure runner sandbox
        run: |
          cat > hcs-runner.yml <<EOF
          run:
            base_dir: ${RUNNER_TEMP}
          EOF

      - name: Dry-run check profile via console script
        run: |
          hcs run \
            --profile check \
            --repeat 2 \
            --dry-run
