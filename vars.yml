---

# GENERAL
_ssh_connection: "{{ hostvars[inventory_hostname].ansible_env.SSH_CONNECTION | default('') }}"
_ssh_connection_fields: "{{ _ssh_connection.split() }}"
# Remote means Ansible itself connects over the network. Never infer this from
# SSH_CONNECTION alone: a local (-c local) run started from an operator's SSH
# session inherits that variable and would masquerade as remote.
network_is_remote: "{{ ansible_connection | default('ssh') != 'local' }}"
hcs_run_id: "{{ run_id|default(ansible_date_time.epoch) }}"
hcs_run_timestamp: "{{ run_timestamp|default(ansible_date_time.iso8601_basic_short) }}"
hcs_base_dir: "{{ base_dir|default('/var/tmp') }}"
hcs_sandbox_dir: "{{ sandbox_dir|default(hcs_base_dir + '/AlmaLinux-HCS-' + hcs_run_timestamp + '-RunID-' + hcs_run_id) }}"
hcs_work_dir: "{{ work_dir|default(hcs_sandbox_dir) }}"
hcs_scratch_dir: "{{ scratch_dir|default(hcs_work_dir + '/scratch') }}"
hcs_cache_dir: "{{ cache_dir|default(hcs_work_dir + '/cache') }}"
hcs_artifacts_dir: "{{ artifacts_dir|default(hcs_work_dir + '/artifacts') }}"
lts_ip: "{{ hcs_lts_ip | default(_ssh_connection_fields[0] if _ssh_connection_fields | length >= 4 else '') }}"
lts_tests_dir: "./tests"
lts_logs_dir: "{{ unique_logs_folder|default(logs_dir|default(hcs_work_dir + '/logs')) }}"
sut_ip: "{{ hcs_sut_ip | default(_ssh_connection_fields[2] if _ssh_connection_fields | length >= 4 else '') }}"
sut_tests_dir: "{{ tests_dir|default(hcs_work_dir + '/sut-tests') }}"

# CPU
test_cpu:
  # Test duration seconds, minutes, hours, days, or years with the s, m, h, d, or y suffix.
  duration: "{{ cpu_duration|default('10m') }}"
  # Directory used by stress-ng for temporary files.
  scratch_dir: "{{ cpu_scratch_dir|default(hcs_scratch_dir + '/cpu') }}"
  # Temporary log path on the SUT. Ansible still copies stdout to lts_logs_dir.
  log_file: "{{ cpu_log_file|default(hcs_scratch_dir + '/cpu/cpu_testing.log') }}"

# Network
test_network:
  # Test duration in seconds
  duration: "{{ network_duration|default('14400') }}"
  # Target network test speed in Mbps
  speed: "{{ network_speed|default('0') }}"
  # Testing a specific network device
  device: "{{ network_device|default('') }}"

# RAID
test_raid:
  # Test duration in seconds
  duration: "{{ raid_duration|default('14400') }}"
  # fio writes raw random data over the MD array device. By default only
  # unmounted arrays without a data signature are stressed; set
  # raid_allow_data_loss=true to stress arrays that hold data (DESTROYS DATA).
  allow_data_loss: "{{ raid_allow_data_loss|default(false) }}"

# PHORONIX
test_phoronix:
  tests:
    9:
      # compilation
      - pts/build-python
      # kernel
      - pts/osbench
      - pts/schbench
      - pts/t-test1
      - pts/tinymembench
      - wireguard
      # memory
      - pts/cachebench
      - pts/ramspeed
      - pts/stream
    10:
      # compilation
      - pts/build-python
      # kernel
      - pts/osbench
      - pts/schbench
      - pts/t-test1
      - pts/tinymembench
      - wireguard
      # memory
      - pts/cachebench
      - pts/ramspeed
      - pts/stream

  folder: "{{ phoronix_folder|default(hcs_work_dir + '/phoronix') }}"
  need_space: "{{ phoronix_need_space|default(300) }}"

# GPU Burn
test_gpu_burn:
  # GPU Burn runs only when NVIDIA drivers are already installed and nvidia-smi works.
  duration: "{{ gpu_burn_duration|default('60') }}"
  memory: "{{ gpu_burn_memory|default('90%') }}"
  devices: "{{ gpu_burn_devices|default('') }}"
  use_doubles: "{{ gpu_burn_use_doubles|default(false) }}"
  use_tensor_cores: "{{ gpu_burn_use_tensor_cores|default(false) }}"
  telemetry_interval: "{{ gpu_burn_telemetry_interval|default('5') }}"
  snap_package: "{{ gpu_burn_snap_package|default('gpu-burn') }}"
  install_snap: "{{ gpu_burn_install_snap|default(false) }}"
  remove_snap_after: "{{ gpu_burn_remove_snap_after|default(false) }}"
  source_url: "{{ gpu_burn_source_url|default('https://github.com/wilicc/gpu-burn.git') }}"
  # Pinned commit (upstream has no tags; master as of 2026-05-31) for
  # reproducible evidence. Override with gpu_burn_source_ref.
  source_ref: "{{ gpu_burn_source_ref|default('3ead140434da9473582b68452f7115967a7a0581') }}"
  source_dir: "{{ gpu_burn_source_dir|default(hcs_cache_dir + '/gpu-burn') }}"
  binary: "{{ gpu_burn_binary|default(hcs_cache_dir + '/gpu-burn/gpu_burn') }}"
  build_from_source: "{{ gpu_burn_build_from_source|default(true) }}"
  log_file: "{{ gpu_burn_log_file|default(hcs_scratch_dir + '/gpu-burn/gpu-burn.log') }}"
  telemetry_file: "{{ gpu_burn_telemetry_file|default(hcs_artifacts_dir + '/gpu-burn/gpu-burn.nvidia-smi.csv') }}"
  result_file: "{{ gpu_burn_result_file|default(hcs_artifacts_dir + '/gpu-burn/gpu-burn.result.json') }}"

# AI inference (llama.cpp llama-bench)
test_ai_llm:
  # llama-bench measurement repetitions (-r). Scaled per profile via ai_llm_repetitions.
  repetitions: "{{ ai_llm_repetitions|default('5') }}"
  # Prompt-processing tokens (-p) and token-generation tokens (-n).
  prompt_tokens: "{{ ai_llm_prompt_tokens|default('512') }}"
  gen_tokens: "{{ ai_llm_gen_tokens|default('128') }}"
  # CPU threads (-t); empty lets llama-bench choose.
  threads: "{{ ai_llm_threads|default('') }}"
  # auto picks CUDA when nvcc+nvidia-smi exist, else CPU. cpu/cuda/vulkan/hip force a backend.
  backend: "{{ ai_llm_backend|default('auto') }}"
  gpu_layers: "{{ ai_llm_gpu_layers|default('99') }}"
  cmake_extra: "{{ ai_llm_cmake_extra|default('') }}"
  # Point model at a local GGUF for air-gapped runs; otherwise model_url is downloaded.
  model: "{{ ai_llm_model|default('') }}"
  model_url: "{{ ai_llm_model_url|default('https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf') }}"
  # Optional sha256 of the GGUF; when set, the model is verified before use.
  model_sha256: "{{ ai_llm_model_sha256|default('') }}"
  model_dir: "{{ ai_llm_model_dir|default(hcs_cache_dir + '/ai-llm/models') }}"
  download_model: "{{ ai_llm_download_model|default(true) }}"
  source_url: "{{ ai_llm_source_url|default('https://github.com/ggml-org/llama.cpp.git') }}"
  # Pinned release tag (2026-06-11) for reproducible evidence. Override with
  # ai_llm_source_ref to track a different tag/branch/commit.
  source_ref: "{{ ai_llm_source_ref|default('b9601') }}"
  source_dir: "{{ ai_llm_source_dir|default(hcs_cache_dir + '/llama.cpp') }}"
  binary: "{{ ai_llm_binary|default(hcs_cache_dir + '/llama.cpp/build/bin/llama-bench') }}"
  build_from_source: "{{ ai_llm_build_from_source|default(true) }}"
  log_file: "{{ ai_llm_log_file|default(hcs_scratch_dir + '/ai-llm/ai-llm.log') }}"
  result_file: "{{ ai_llm_result_file|default(hcs_artifacts_dir + '/ai-llm/ai-llm.result.json') }}"
  bench_json_file: "{{ ai_llm_bench_json_file|default(hcs_artifacts_dir + '/ai-llm/ai-llm.llama-bench.json') }}"

# LTP
# Path to clone LTP project to SUT
ltp_clone_path: "{{ ltp_dir|default(hcs_work_dir + '/ltp') }}"
test_ltp:
  suites: "{{ ltp_suites|default('all') }}"
  log_file: "{{ ltp_log_file|default(hcs_scratch_dir + '/ltp-full.log') }}"
